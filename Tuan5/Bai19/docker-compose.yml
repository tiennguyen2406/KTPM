version: '3.8'

services:
  vote:
    image: dockersamples/examplevotingapp_vote:latest
    container_name: vote-app
    ports:
      - "5000:80"
    depends_on:
      - redis
    networks:
      - frontend
      - backend

  result:
    image: dockersamples/examplevotingapp_result:latest
    container_name: result-app
    ports:
      - "5001:80"
    depends_on:
      - db
    networks:
      - frontend
      - backend

  worker:
    image: dockersamples/examplevotingapp_worker:latest
    container_name: vote-worker
    depends_on:
      - redis
      - db
    networks:
      - backend

  redis:
    image: redis:alpine
    container_name: vote-redis
    networks:
      - backend

  db:
    image: postgres:15-alpine
    container_name: vote-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  db_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

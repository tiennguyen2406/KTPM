version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis-limited
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: redis-server --maxmemory 400mb --maxmemory-policy allkeys-lru
